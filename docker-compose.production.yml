version: '3.8'

services:
  docs:
    image: jonas1015/chacc-docs:latest
    # build:
    #   context: ./chacc-docs
    #   dockerfile: Dockerfile
    ports:
      - "8000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s